name: Publish Test

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Test mode"
        required: true
        type: choice
        options:
          - provenance-only
          - concurrent
          - a-first
          - b-first
          - dual-token
          - dual-token-a-first
          - dual-token-b-first
        default: concurrent
      version_suffix:
        description: "Version suffix (leave empty for timestamp)"
        required: false
        type: string
      delay:
        description: "Stagger delay in seconds"
        required: false
        type: string
        default: "2"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Authenticate
        id: oidc
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" | jq -r '.value')

          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "::error::Failed to retrieve OIDC token"
            exit 1
          fi
          echo "OIDC token retrieved (${#OIDC_TOKEN} chars)"

          echo "$OIDC_TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq '{
            iss, aud, repository, repository_visibility,
            workflow_ref, runner_environment, ref
          }' || true

          NPM_TOKEN=$(curl -s -X POST \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/ghostpublish" \
            -H "Authorization: Bearer ${OIDC_TOKEN}" \
            -H "Content-Type: application/json" | jq -r '.token')

          if [ -z "$NPM_TOKEN" ] || [ "$NPM_TOKEN" = "null" ]; then
            echo "::error::Failed to exchange OIDC token"
            exit 1
          fi
          echo "npm token obtained"

          echo "::add-mask::${NPM_TOKEN}"
          echo "npm_token=${NPM_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Version
        id: version
        run: |
          SUFFIX="${{ inputs.version_suffix }}"
          if [ -z "$SUFFIX" ]; then
            SUFFIX="$(date +%s)"
          fi
          echo "version=1.0.0-ci.${SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "Using version: 1.0.0-ci.${SUFFIX}"

      - name: "Mode: provenance-only"
        if: inputs.mode == 'provenance-only'
        env:
          NODE_AUTH_TOKEN: ${{ steps.oidc.outputs.npm_token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          rm -rf /tmp/pkg-a && mkdir -p /tmp/pkg-a
          echo "{\"name\": \"ghostpublish\", \"version\": \"${VERSION}\", \"description\": \"test\", \"repository\": {\"type\": \"git\", \"url\": \"https://github.com/darcyclarke/ghostpublish\"}}" > /tmp/pkg-a/package.json
          echo "// BUILD: $(openssl rand -hex 16)" > /tmp/pkg-a/index.js

          cd /tmp/pkg-a
          npm publish --access public --tag latest --provenance 2>&1

          sleep 5
          curl -s "https://registry.npmjs.org/-/npm/v1/attestations/ghostpublish@${VERSION}" | jq .

      - name: "Mode: single-token"
        if: inputs.mode == 'concurrent' || inputs.mode == 'a-first' || inputs.mode == 'b-first'
        env:
          NODE_AUTH_TOKEN: ${{ steps.oidc.outputs.npm_token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DELAY="${{ inputs.delay }}"
          source $GITHUB_WORKSPACE/scripts/ci-publish-and-check.sh "$VERSION" "${{ inputs.mode }}" "${DELAY:-2}"

      - name: "Mode: dual-token"
        if: inputs.mode == 'dual-token' || inputs.mode == 'dual-token-a-first' || inputs.mode == 'dual-token-b-first'
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.npm_token }}
          GRANULAR_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DELAY="${{ inputs.delay }}"
          MODE="${{ inputs.mode }}"
          MODE="${MODE#dual-token}"
          [ -z "$MODE" ] && MODE="concurrent" || MODE="${MODE#-}"
          source $GITHUB_WORKSPACE/scripts/ci-dual-token.sh "$VERSION" "$MODE" "${DELAY:-2}"
