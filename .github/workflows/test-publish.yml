name: Publish Test

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Test mode"
        required: true
        type: choice
        options:
          - provenance-only
          - s1-token-race
          - s2-token-vs-oidc
          - s3-token-vs-token-prov
          - worst-case
        default: s1-token-race
      version_suffix:
        description: "Version suffix (leave empty for timestamp)"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Authenticate
        id: auth
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" | jq -r '.value')

          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "::error::Failed to retrieve OIDC token"
            exit 1
          fi
          echo "OIDC token retrieved (${#OIDC_TOKEN} chars)"

          NPM_OIDC=$(curl -s -X POST \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/ghostpublish" \
            -H "Authorization: Bearer ${OIDC_TOKEN}" \
            -H "Content-Type: application/json" | jq -r '.token')

          if [ -z "$NPM_OIDC" ] || [ "$NPM_OIDC" = "null" ]; then
            echo "::error::Failed to exchange OIDC token"
            exit 1
          fi
          echo "OIDC npm token obtained"

          echo "::add-mask::${NPM_OIDC}"
          echo "oidc_token=${NPM_OIDC}" >> "$GITHUB_OUTPUT"

      - name: Version
        id: version
        run: |
          SUFFIX="${{ inputs.version_suffix }}"
          if [ -z "$SUFFIX" ]; then
            SUFFIX="$(date +%s)"
          fi
          echo "version=1.0.0-ci.${SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "Using version: 1.0.0-ci.${SUFFIX}"

      - name: "Mode: provenance-only"
        if: inputs.mode == 'provenance-only'
        env:
          NODE_AUTH_TOKEN: ${{ steps.auth.outputs.oidc_token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          rm -rf /tmp/pkg-a && mkdir -p /tmp/pkg-a
          echo "{\"name\": \"ghostpublish\", \"version\": \"${VERSION}\", \"description\": \"test\", \"repository\": {\"type\": \"git\", \"url\": \"https://github.com/darcyclarke/ghostpublish\"}}" > /tmp/pkg-a/package.json
          echo "// BUILD: $(openssl rand -hex 16)" > /tmp/pkg-a/index.js
          cd /tmp/pkg-a
          npm publish --access public --tag latest --provenance 2>&1
          sleep 5
          curl -s "https://registry.npmjs.org/-/npm/v1/attestations/ghostpublish@${VERSION}" | jq .

      - name: "S1: Both granular tokens, no provenance"
        if: inputs.mode == 's1-token-race'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TOKEN="${{ secrets.NPM_AUTH_TOKEN }}"
          source $GITHUB_WORKSPACE/scripts/ci-race.sh \
            "$VERSION" "$TOKEN" "false" "$TOKEN" "false" "concurrent" "0"

      - name: "S2: Granular token vs OIDC + provenance"
        if: inputs.mode == 's2-token-vs-oidc'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          GRANULAR="${{ secrets.NPM_AUTH_TOKEN }}"
          OIDC="${{ steps.auth.outputs.oidc_token }}"
          source $GITHUB_WORKSPACE/scripts/ci-race.sh \
            "$VERSION" "$GRANULAR" "false" "$OIDC" "true" "concurrent" "0"

      - name: "S3: Granular token vs granular token + provenance"
        if: inputs.mode == 's3-token-vs-token-prov'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TOKEN="${{ secrets.NPM_AUTH_TOKEN }}"
          source $GITHUB_WORKSPACE/scripts/ci-race.sh \
            "$VERSION" "$TOKEN" "false" "$TOKEN" "true" "concurrent" "0"

      - name: "Worst case: dual provenance race (retries until both succeed)"
        if: inputs.mode == 'worst-case'
        run: |
          TOKEN="${{ secrets.NPM_AUTH_TOKEN }}"
          source $GITHUB_WORKSPACE/scripts/ci-worst-case.sh "$TOKEN" 20
